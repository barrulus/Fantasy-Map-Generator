[build]
  command = "npm run build"
  publish = "dist"
  environment = { NODE_VERSION = "24" }

# Redirects live in public/_redirects (copied to the publish dir) — a _redirects file
# is evaluated strictly top-to-bottom and the force flag (!) reliably beats the SPA
# catch-all, which the netlify.toml [[redirects]] ordering did not.
